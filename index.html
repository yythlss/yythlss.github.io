<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习资料</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card h2 {
            font-size: 1.6em;
            color: #667eea;
            margin-bottom: 8px;
        }
        .card p {
            color: #666;
            font-size: 1.1em;
        }
        .card .arrow {
            float: right;
            color: #667eea;
            font-size: 1.5em;
            margin-top: -30px;
        }
        footer {
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 复习资料</h1>
        <p class="subtitle">课程复习知识点汇总</p>

        <div class="cards">
            <a class="card" href="数电复习知识点.html">
                <h2>数字电子技术</h2>
                <p>数电复习知识点整理</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="高频电子线路复习知识点.html">
                <h2>高频电子线路</h2>
                <p>高频电子线路复习知识点与公式汇总</p>
                <span class="arrow">→</span>
            </a>
        </div>

        <footer>
            <p>持续更新中...</p>
        </footer>
    </div>
</body>
</html>
