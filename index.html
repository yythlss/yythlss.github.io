<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background: linear-gradient(135deg,#e0f7ff,#f0f4ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
        }
        .title{
            font-size: 42px;
            color: #222;
            margin-bottom: 15px;
        }
        .desc{
            color: #666;
            font-size: 18px;
            margin-bottom: 50px;
        }
        .nav{
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav a{
            text-decoration: none;
            padding: 14px 32px;
            background: #409eff;
            color: #fff;
            border-radius: 50px;
            font-size: 17px;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(64,158,255,0.3);
        }
        .nav a:hover{
            background: #237bdd;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <h1 class="title">欢迎来到我的主页</h1>
    <p class="desc">记录生活 · 分享爱好 · 收藏美好</p>

    <div class="nav">
        <a href="pindou.html">拼豆色号查找工具</a>
    </div>

</body>
</html>
