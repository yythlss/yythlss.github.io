<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .desc {
            color: #7f8c8d;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .nav-item {
            display: block;
            padding: 1rem 1.5rem;
            background-color: #3498db;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
        }
        .nav-item:hover {
            background-color: #2980b9;
        }
        .footer {
            margin-top: 2rem;
            color: #95a5a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 我的个人导航站</h1>
    <p class="desc">欢迎访问我的 GitHub Pages 主页</p>

    <div class="nav-list">
        <a href="https://yythlss.github.io" class="nav-item">🏠 首页</a>
        <a href="nav.html" class="nav-item">🎨 实用工具导航</a>
        <a href="color.html" class="nav-item">🌈 色号查找工具</a>
    </div>

    <div class="footer">
        Powered by GitHub Pages
    </div>
</div>

</body>
</html>
