<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习资料</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .card h2 {
            font-size: 1.6em;
            color: #667eea;
            margin-bottom: 8px;
        }
        .card p {
            color: #666;
            font-size: 1.1em;
        }
        .card .arrow {
            float: right;
            color: #667eea;
            font-size: 1.5em;
            margin-top: -30px;
        }
        footer {
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
            font-size: 0.9em;
        }
        /* 密码保护样式 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .password-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .password-box h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .password-box p {
            color: #666;
            margin-bottom: 25px;
        }
        .password-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .password-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .password-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .password-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 密码输入界面 -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>🔐 访问验证</h2>
            <p>请输入密码查看复习资料</p>
            <input type="password" id="passwordInput" placeholder="请输入密码" autofocus>
            <br>
            <button onclick="checkPassword()">确认</button>
            <p class="error-msg" id="errorMsg">密码错误，请重试</p>
        </div>
    </div>

    <!-- 主页内容 -->
    <div class="container hidden" id="mainContent">
        <h1>📚 复习资料</h1>
        <p class="subtitle">课程复习知识点汇总</p>

        <div class="cards">
            <a class="card" href="数电复习知识点.html">
                <h2>数字电子技术</h2>
                <p>数电复习知识点整理</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="高频电子线路复习知识点.html">
                <h2>高频电子线路</h2>
                <p>高频电子线路复习知识点与公式汇总</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="刷题网页.html">
                <h2>习概刷题</h2>
                <p>习近平新时代中国特色社会主义思想概论在线刷题</p>
                <span class="arrow">→</span>
            </a>

            <a class="card" href="概率论复习知识点.html">
                <h2>概率论</h2>
                <p>概率论复习知识点整理</p>
                <span class="arrow">→</span>
            </a>
        </div>

        <footer>
            <p>持续更新中...</p>
        </footer>
    </div>

    <script>
        const correctPassword = 'yyy';

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === correctPassword) {
                document.getElementById('passwordOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                localStorage.setItem('authenticated', 'true');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        // 支持回车键提交
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // 检查是否已验证过
        if (localStorage.getItem('authenticated') === 'true') {
            document.getElementById('passwordOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }
    </script>
</body>
</html>
