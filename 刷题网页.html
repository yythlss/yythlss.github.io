        // 状态变量
        let currentQuestion = 0;
        let filteredQuestions = [...questions];
        let correctCount = 0;
        let wrongCount = 0;
        let mode = 'practice'; // practice or exam
        let selectedAnswers = {};
        let answeredQuestions = new Set();

        // 初始化
        function init() {
            updateStats();
            renderQuestion();
        }

        // 筛选章节
        function filterChapter(chapter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.includes('第') && btn.textContent.includes('章')) {
                    btn.classList.remove('active');
                }
            });

            if (chapter === 'all') {
                filteredQuestions = [...questions];
                document.querySelector('.filter-btn[onclick="filterChapter(\'all\')"]').classList.add('active');
            } else {
                filteredQuestions = questions.filter(q => q.chapter == chapter);
                document.querySelector(`.filter-btn[onclick="filterChapter('${chapter}')"]`).classList.add('active');
            }

            currentQuestion = 0;
            updateStats();
            renderQuestion();
        }

        // 筛选题型
        function filterType(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.includes('题')) {
                    btn.classList.remove('active');
                }
            });

            if (type === 'all') {
                filteredQuestions = questions.filter(q => {
                    const chapterFilter = document.querySelector('.filter-btn.active[onclick*="filterChapter"]');
                    if (chapterFilter && !chapterFilter.textContent.includes('全部')) {
                        const chapter = chapterFilter.textContent.replace('第', '').replace('章', '');
                        return q.chapter == chapter;
                    }
                    return true;
                });
                document.querySelector('.filter-btn[onclick="filterType(\'all\')"]').classList.add('active');
            } else {
                filteredQuestions = questions.filter(q => {
                    const chapterFilter = document.querySelector('.filter-btn.active[onclick*="filterChapter"]');
                    let chapterMatch = true;
                    if (chapterFilter && !chapterFilter.textContent.includes('全部')) {
                        const chapter = chapterFilter.textContent.replace('第', '').replace('章', '');
                        chapterMatch = q.chapter == chapter;
                    }
                    return q.type === type && chapterMatch;
                });
                document.querySelector(`.filter-btn[onclick="filterType('${type}')"]`).classList.add('active');
            }

            currentQuestion = 0;
            updateStats();
            renderQuestion();
        }

        // 设置模式
        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.style.opacity = '0.7');
            document.querySelector(`.mode-btn.${newMode}`).style.opacity = '1';
        }

        // 渲染题目
        function renderQuestion() {
            if (filteredQuestions.length === 0) {
                document.getElementById('questionContainer').innerHTML = '<div class="question-card"><p style="text-align:center;color:#666;">没有找到符合条件的题目</p></div>';
                return;
            }

            const q = filteredQuestions[currentQuestion];
            const isAnswered = answeredQuestions.has(q.id);

            let typeClass = '';
            let typeText = '';
            switch(q.type) {
                case 'single': typeClass = 'type-single'; typeText = '单选题'; break;
                case 'multi': typeClass = 'type-multi'; typeText = '多选题'; break;
                case 'fill': typeClass = 'type-fill'; typeText = '填空题'; break;
                case 'judge': typeClass = 'type-judge'; typeText = '判断题'; break;
                case 'essay': typeClass = 'type-essay'; typeText = '简答/论述'; break;
            }

            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-type ${typeClass}">${typeText}</span>
                        <span class="chapter-tag">第${q.chapter}章</span>
                    </div>
                    <div class="question-text">${currentQuestion + 1}. ${q.question}</div>
            `;

            if (q.type === 'single' || q.type === 'multi') {
                html += '<div class="options">';
                q.options.forEach((opt, index) => {
                    const letter = String.fromCharCode(65 + index);
                    let selectedClass = '';
                    if (selectedAnswers[q.id]) {
                        if (q.type === 'single') {
                            if (letter === selectedAnswers[q.id]) {
                                selectedClass = isAnswered ? (selectedAnswers[q.id] === q.answer ? 'correct' : 'wrong') : 'selected';
                            }
                            if (isAnswered && letter === q.answer) {
                                selectedClass = 'correct';
                            }
                        } else {
                            if (selectedAnswers[q.id].includes(letter)) {
                                selectedClass = isAnswered ? (q.answer.includes(letter) ? 'correct' : 'wrong') : 'selected';
                            }
                            if (isAnswered && q.answer.includes(letter)) {
                                selectedClass = 'correct';
                            }
                        }
                    }
                    html += `<div class="option ${selectedClass}" onclick="selectOption('${letter}', '${q.id}')" ${isAnswered ? 'style="pointer-events:none;"' : ''}>${letter}. ${opt}</div>`;
                });
                html += '</div>';
            } else if (q.type === 'fill') {
                html += `<input type="text" class="fill-input" id="fill-${q.id}" placeholder="请输入答案" ${isAnswered ? 'disabled' : ''} value="${selectedAnswers[q.id] || ''}">`;
            } else if (q.type === 'judge') {
                html += '<div class="judge-options">';
                const trueClass = selectedAnswers[q.id] === 'true' ? (isAnswered ? (q.answer === true ? 'correct' : 'wrong') : 'selected') : '';
                const falseClass = selectedAnswers[q.id] === 'false' ? (isAnswered ? (q.answer === false ? 'correct' : 'wrong') : 'selected') : '';
                html += `<div class="judge-btn ${trueClass}" onclick="selectJudge('true', '${q.id}')" ${isAnswered ? 'style="pointer-events:none;"' : ''}>✓ 正确</div>`;
                html += `<div class="judge-btn ${falseClass}" onclick="selectJudge('false', '${q.id}')" ${isAnswered ? 'style="pointer-events:none;"' : ''}>✗ 错误</div>`;
                html += '</div>';
            } else if (q.type === 'essay') {
                html += `<textarea class="essay-area" id="essay-${q.id}" placeholder="请输入你的答案..." ${isAnswered ? 'disabled' : ''}>${selectedAnswers[q.id] || ''}</textarea>`;
            }

            if (!isAnswered) {
                html += `<button class="submit-btn" onclick="submitAnswer(${q.id})">提交答案</button>`;
            }

            html += `
                <div class="explanation ${isAnswered ? 'show' : ''}" id="explanation-${q.id}">
                    <h4>📝 解析</h4>
                    <p><span class="answer-label">正确答案：</span>${typeof q.answer === 'boolean' ? (q.answer ? '正确' : '错误') : q.answer}</p>
                    <p>${q.explanation}</p>
                </div>
            `;

            html += '</div>';

            document.getElementById('questionContainer').innerHTML = html;
            document.getElementById('questionCounter').textContent = `第 ${currentQuestion + 1} 题 / 共 ${filteredQuestions.length} 题`;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / filteredQuestions.length) * 100}%`;

            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = currentQuestion === filteredQuestions.length - 1;
        }

        // 选择选项
        function selectOption(letter, id) {
            if (answeredQuestions.has(parseInt(id))) return;

            const q = questions.find(q => q.id === parseInt(id));
            if (q.type === 'single') {
                selectedAnswers[id] = letter;
            } else {
                if (!selectedAnswers[id]) selectedAnswers[id] = '';
                if (selectedAnswers[id].includes(letter)) {
                    selectedAnswers[id] = selectedAnswers[id].replace(letter, '');
                } else {
                    selectedAnswers[id] += letter;
                }
            }
            renderQuestion();
        }

        // 选择判断
        function selectJudge(value, id) {
            if (answeredQuestions.has(parseInt(id))) return;
            selectedAnswers[id] = value;
            renderQuestion();
        }

        // 提交答案
        function submitAnswer(id) {
            const q = questions.find(q => q.id === id);

            if (q.type === 'fill') {
                const input = document.getElementById(`fill-${id}`);
                selectedAnswers[id] = input.value.trim();
            } else if (q.type === 'essay') {
                const textarea = document.getElementById(`essay-${id}`);
                selectedAnswers[id] = textarea.value.trim();
            }

            if (!selectedAnswers[id] && selectedAnswers[id] !== 'false') {
                alert('请先选择或输入答案！');
                return;
            }

            answeredQuestions.add(id);

            if (q.type !== 'essay') {
                let isCorrect = false;
                if (q.type === 'single') {
                    isCorrect = selectedAnswers[id] === q.answer;
                } else if (q.type === 'multi') {
                    const sorted1 = selectedAnswers[id].split('').sort().join('');
                    const sorted2 = q.answer.split('').sort().join('');
                    isCorrect = sorted1 === sorted2;
                } else if (q.type === 'judge') {
                    isCorrect = selectedAnswers[id] === String(q.answer);
                } else if (q.type === 'fill') {
                    isCorrect = selectedAnswers[id].includes(q.answer) || q.answer.includes(selectedAnswers[id]);
                }

                if (isCorrect) {
                    correctCount++;
                } else {
                    wrongCount++;
                }
            }

            updateStats();
            renderQuestion();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalQuestions').textContent = filteredQuestions.length;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            const total = correctCount + wrongCount;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((correctCount / total) * 100) + '%' : '0%';
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestion < filteredQuestions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        }

        // 初始化
        init();
    </script>
